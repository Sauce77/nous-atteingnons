<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red de Contactos</title>
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <!-- Datatables.js -->
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.4/css/dataTables.dataTables.css" />
    <script src="https://cdn.datatables.net/2.3.4/js/dataTables.js"></script>

    {% block headers %}
    {% endblock %}

    <style>
        body {
            display: flex;
            min-height: 100vh;
            flex-direction: column;
        }
        .main-wrapper {
            display: flex;
            flex: 1;
        }
        .sidebar {
            width: 250px; /* Ancho fijo de la barra lateral */
            background-color: #343a40; /* Color de fondo oscuro */
            padding-top: 1.5rem;
            min-height: 100vh;
        }
        .sidebar .nav-link {
            color: #adb5bd; /* Color del texto de los enlaces */
            font-size: 1.1rem;
            padding: 0.75rem 1.5rem;
        }
        .sidebar .nav-link:hover {
            color: #ffffff; /* Color del texto al pasar el mouse */
            background-color: #495057; /* Fondo al pasar el mouse */
        }
        .sidebar .nav-link.active {
            color: #ffffff;
            font-weight: bold;
        }
        .sidebar .nav-link i {
            margin-right: 10px; /* Espacio entre el icono y el texto */
        }
        .content {
            flex-grow: 1; /* El contenido principal ocupa el resto del espacio */
            padding: 2rem;
            background-color: #f8f9fa; /* Fondo claro para el contenido */
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <nav class="sidebar d-flex flex-column flex-shrink-0 p-3 text-white bg-dark" id="sidebar-nav">
        <a class="fs-4 text-decoration-none text-white" href="{% url 'home' %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="2rem" height="2rem" fill="currentColor" class="bi bi-globe-americas" viewBox="0 0 16 16">
                <path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0M2.04 4.326c.325 1.329 2.532 2.54 3.717 3.19.48.263.793.434.743.484q-.121.12-.242.234c-.416.396-.787.749-.758 1.266.035.634.618.824 1.214 1.017.577.188 1.168.38 1.286.983.082.417-.075.988-.22 1.52-.215.782-.406 1.48.22 1.48 1.5-.5 3.798-3.186 4-5 .138-1.243-2-2-3.5-2.5-.478-.16-.755.081-.99.284-.172.15-.322.279-.51.216-.445-.148-2.5-2-1.5-2.5.78-.39.952-.171 1.227.182.078.099.163.208.273.318.609.304.662-.132.723-.633.039-.322.081-.671.277-.867.434-.434 1.265-.791 2.028-1.12.712-.306 1.365-.587 1.579-.88A7 7 0 1 1 2.04 4.327Z"/>
            </svg>
        </a>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            {% url 'home' as inicio %}
            <li class="nav-item">
                <a href="{{ inicio }}" class="nav-link text-white {% if request.path == inicio %}active{% endif %}">
                    Inicio
                </a>
            </li>

            {% url 'contactos:mostrarContactos' as buscar %}
            <li class="nav-item">
                <a href="{{ buscar }}" class="nav-link text-white {% if request.path == buscar %}active{% endif %}">
                    Buscar
                </a>
            </li>

            {% url 'contactos:insertarContacto' as insertar %}
            <li class="nav-item">
                <a href="{{ insertar }}" class="nav-link text-white {% if request.path == insertar %}active{% endif %}">
                    Nuevo Contacto
                </a>
            </li>
            
        </ul>

        <hr>
        <div>
            <strong>IAJU</strong>
        </div>
    </nav>

    <main class="content">        
        {% block content %}
        {% endblock %}
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</body>
</html>
